<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
body {
    font-family: Arial, Helvetica, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background:whitesmoke;
    padding: 25px;
    width: 320px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    color:gray;
}

input {
    width: 93%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 20px;
    border: 1px solid gray;
    background-color: rgb(228, 227, 227);
}

button {
    width: 100%;
    padding: 8px;
    margin-top: 15px;
    background:linear-gradient(rgb(0, 153, 255), rgb(38, 38, 179));
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

.error {
    color: red;
    margin-top: 10px;
    text-align: center;
    display: none;
}


    </style>
</head>
<body>
    <div class="box" id="loginBox">
        <h2>LOGIN YUK👇</h2>
        <form id="">
            <input type="text" id="username" placeholder="masukkan nama" required>
            <input type="password" id="password" placeholder="kata sandi" required>
            <button onclick="login()">Login</button>
        </form>
        <p class="error" id="errorMsg">Password/Username salah!</p>
    </div>
    <script>
        function login() {
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;
            console.log(user);

             if (user === "ndapluviophile" && pass === "phitt") {
                localStorage.setItem("isLoggedIn", "true");
                 window.location.href = "dhsbord.html";
            } else {
                // password salah
                document.getElementById("errorMsg").style.display = "block";
            }
        }
    </script>
</body>
</html>
